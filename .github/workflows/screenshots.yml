name: Screenshots

# Manual trigger only. Paste a Vercel preview URL (or any reachable BASE URL) when dispatching;
# the runner navigates every path in scripts/screenshots/routes.json at desktop + mobile viewports
# and uploads the result as a workflow artifact.
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL to capture (Vercel preview, staging, prod, etc). No trailing slash.'
        required: true
        type: string
      concurrency:
        description: 'Pages captured in parallel per viewport.'
        required: false
        default: '4'
        type: string

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4.0.1
        with:
          node-version: 24.x

      - name: Install Playwright runner
        working-directory: scripts/screenshots
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        working-directory: scripts/screenshots
        run: npx playwright install --with-deps chromium

      - name: Sanity-check BASE_URL is reachable
        env:
          BASE_URL: ${{ inputs.url }}
        run: |
          echo "Checking ${BASE_URL} ..."
          # Vercel previews can return non-2xx for unauthenticated requests, but they should
          # at least respond. Anything else (DNS failure, connection refused) means the URL
          # is wrong and we should fail fast instead of running 50+ navigations against it.
          curl -sS -o /dev/null --connect-timeout 10 --max-time 20 -- "$BASE_URL" || {
            echo "::error::BASE_URL is not reachable"
            exit 1
          }

      - name: Capture screenshots
        working-directory: scripts/screenshots
        env:
          BASE_URL: ${{ inputs.url }}
          OUTPUT_DIR: ${{ github.workspace }}/screenshots
          CONCURRENCY: ${{ inputs.concurrency }}
          # When the secret is unset (forks, missing config), the runner falls back to
          # anonymous captures. The secret value is masked in logs by GitHub Actions.
          DCL_TEST_PRIVATE_KEY: ${{ secrets.DCL_TEST_PRIVATE_KEY }}
        run: npm run capture

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots
          if-no-files-found: error
          retention-days: 14
