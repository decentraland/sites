name: e2e

on:
  pull_request:
  push:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Force the preview build to use relative asset paths (no CDN rewrite).
    # See scripts/prebuild.cjs:getPublicUrls — without GEN_STATIC_LOCAL, CI
    # rewrites VITE_BASE_URL to https://cdn.decentraland.org/@dcl/sites/<v>,
    # which has no assets for unreleased SHAs and breaks the bundle.
    env:
      GEN_STATIC_LOCAL: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - run: npm run e2e:check-fixtures

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
