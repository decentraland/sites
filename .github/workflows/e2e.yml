name: e2e

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Force the preview build to use relative asset paths (no CDN rewrite).
    # See scripts/prebuild.cjs:getPublicUrls — without GEN_STATIC_LOCAL, CI
    # rewrites VITE_BASE_URL to https://cdn.decentraland.org/@dcl/sites/<v>,
    # which has no assets for unreleased SHAs and breaks the bundle.
    env:
      GEN_STATIC_LOCAL: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - run: npm run e2e:check-fixtures

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Publish Playwright report to GitHub Pages
        if: always() && github.event.pull_request.number
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: "chore: publish playwright report for PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})"

      - name: Comment Playwright report link on PR
        if: always() && github.event.pull_request.number
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_CONCLUSION: ${{ job.status }}
        with:
          script: |
            const marker = '<!-- playwright-report-link -->'
            const pr = Number(process.env.PR_NUMBER)
            const sha = process.env.HEAD_SHA.slice(0, 7)
            const conclusion = process.env.JOB_CONCLUSION
            const emoji = conclusion === 'success' ? '✅' : conclusion === 'failure' ? '❌' : '⚠️'
            const url = `https://decentraland.github.io/sites/pr-${pr}/`
            const body = [
              marker,
              `${emoji} **Playwright report**: ${url}`,
              ``,
              `Last update: \`${sha}\` · job status: \`${conclusion}\` · 1–5 min cache delay applies.`
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr
            })
            const existing = comments.find(c => c.body && c.body.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body
              })
            }
