name: Validate Federation

on: [push]

jobs:
  validate-federation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Validate federation versions
        run: npm run validate:federation
