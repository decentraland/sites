name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the feature or improvement requested.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Problem / Motivation
      description: "What problem does this solve? Why is it needed?"
      placeholder: "As a user, I can't do X which makes Y frustrating..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: user-flow
    attributes:
      label: User Flow
      description: Step-by-step description of how a user would interact with this feature.
      value: |
        1. User goes to...
        2. User clicks...
        3. User sees...

  - type: textarea
    id: design
    attributes:
      label: Design / Mockups
      description: Link to Figma or drag and drop screenshots/mockups if available.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, links, or references that might be helpful.
