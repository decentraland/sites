name: Feature Request
description: Suggest a new feature or improvement
title: '[Feature]: <briefly describe the request>'
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        **Title:** replace the `<briefly describe the request>` placeholder with a one-line summary (e.g. `[Feature]: dark mode for blog posts`). Issues with placeholder titles will be sent back.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the feature or improvement requested.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Problem / Motivation
      description: 'What problem does this solve? Why is it needed?'
      placeholder: "As a user, I can't do X which makes Y frustrating..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High — blocks an important flow or initiative
        - Medium — meaningful improvement, not blocking
        - Low — nice to have
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Target audience
      description: Who benefits from this feature?
      options:
        - Visitors (not signed in)
        - Authenticated users
        - Creators
        - Admins / Moderators
        - All users
        - Internal team
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the site does this affect?
      options:
        - Homepage
        - Create / Creators
        - Download flow
        - What's On
        - Jump
        - Blog
        - Social / Communities
        - Sign In / Auth
        - Legal / Static pages
        - Navbar / Footer
        - Tracking / Analytics
        - SEO
        - i18n
        - Other / Cross-cutting

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: user-flow
    attributes:
      label: User Flow
      description: Step-by-step description of how a user would interact with this feature.
      value: |
        1. User goes to...
        2. User clicks...
        3. User sees...

  - type: textarea
    id: design
    attributes:
      label: Design / Mockups
      description: Link to Figma or drag and drop screenshots/mockups if available.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Anything explicitly NOT covered by this request, to avoid scope creep.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, links, or references that might be helpful.
