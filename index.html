<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.decentraland.org" crossorigin />
  <link rel="preconnect" href="https://realm-provider-ea.decentraland.org" />
  <link rel="preconnect" href="https://events.decentraland.zone" />
  <link rel="preconnect" href="https://cms.decentraland.org" crossorigin />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
  <meta name="theme-color" content="#000000" />
  <link rel="preload" as="image" href="/hero_mobile.webp" media="(max-width: 599px)" fetchpriority="high" />
  <link rel="preload" as="image" href="/landing_hero.webp" media="(min-width: 600px)" fetchpriority="high" />
  <title>Decentraland</title>
  <meta name="description" content="Decentraland is a virtual social world where you can explore, play, and hang out with friends. Join live events, games, and experiences in an open metaverse." />
  <meta property="og:title" content="Decentraland — Come Hang Out">
  <meta property="og:description" content="Decentraland is a virtual social world where you can explore, play, and hang out with friends. Join live events, games, and experiences in an open metaverse." />
  <meta property="og:image" content="https://decentraland.org/images/decentraland.png">
  <meta property="twitter:title" content="Decentraland — Come Hang Out">
  <meta property="twitter:description" content="Decentraland is a virtual social world where you can explore, play, and hang out with friends. Join live events, games, and experiences in an open metaverse.">
  <meta property="twitter:image" content="https://decentraland.org/images/decentraland.png">
  <meta property="twitter:card" content="summary_large_image">
</head>

<body>
  <div id="root">
    <!--
      Pre-rendered Hero shell: painted by the browser BEFORE any JS loads.
      This gives us instant FCP/LCP (~0.5s) instead of waiting for the
      ~760 KB React+MUI bundle to download and execute (~5.8s on mobile).
      React replaces this content when it hydrates.
    -->
    <div id="hero-shell" style="position:relative;width:100%;min-height:100vh;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;background-color:#39055C">
      <picture style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0">
        <source srcset="/hero_mobile.webp" media="(max-width: 599px)" />
        <source srcset="/landing_hero.webp" media="(min-width: 600px)" />
        <img src="/landing_hero.webp" alt="" style="width:100%;height:100%;object-fit:cover" />
      </picture>
      <div style="position:absolute;top:0;left:0;width:100%;height:24.3%;background:linear-gradient(180deg,#000 0%,rgba(0,0,0,0) 100%);z-index:1"></div>
      <div style="position:absolute;bottom:0;left:0;width:100%;height:50%;background:linear-gradient(0deg,#39055C 0%,rgba(0,0,0,0) 100%);z-index:1"></div>
      <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;gap:60px;padding-bottom:120px">
        <h2 style="color:#FCFCFC;font-family:Inter,Helvetica,Arial,sans-serif;font-weight:600;font-size:3.75rem;line-height:1.2;letter-spacing:-0.5px;margin:0">Close the Feed.<br>Come Hang Out.</h2>
        <button style="background:#FF2D55;color:#FCFCFC;border:none;width:270px;height:60px;border-radius:16px;font-size:19.89px;font-weight:600;letter-spacing:0.61px;text-transform:uppercase;cursor:pointer;font-family:Inter,Helvetica,Arial,sans-serif;box-shadow:rgba(0,0,0,0.4) 0px 2px 8px">HANG OUT NOW ➜</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
